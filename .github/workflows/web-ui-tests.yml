name: Web UI Automation CI
on: [push]
jobs:
  webui-test-job:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Run Web UI Tests
      run: mvn test -Dtest=SearchFlightTests -Dheadless=true